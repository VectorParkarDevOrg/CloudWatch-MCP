# CloudWatch MCP — standalone deployment
#
# Deploy this on your AWS / infrastructure server.
# Once running, register the URL in VERA: Settings → Integrations → AWS CloudWatch
#
# Setup:
#   1. Copy this file to your server
#   2. cp .env.example .env  and fill in your AWS credentials
#   3. docker compose up -d
#   4. In VERA admin: add MCP server with URL http://<this-server>:8091/mcp
#      and the BEARER_TOKEN you set below.

services:
  cloudwatch-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${PORT:-8091}:8091"
    environment:
      PORT: "${PORT:-8091}"
      # AWS credentials — use these OR attach an IAM role to the host EC2 instance
      AWS_ACCESS_KEY_ID:     "${AWS_ACCESS_KEY_ID}"
      AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY}"
      AWS_DEFAULT_REGION:    "${AWS_DEFAULT_REGION:-us-east-1}"
      # Optional: shared secret VERA sends as Bearer token to authenticate
      BEARER_TOKEN: "${BEARER_TOKEN:-}"
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8091/health',timeout=3).status==200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
